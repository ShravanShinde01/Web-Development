<head>

<style>

}

.image img {

}

    padding: 2px 5px;

    font-size: 12px;
}
    .card {
        display: flex;

    }

    .info {
        display: flex;
        flex-direction: column;
    }

    .info2 {
        display: flex;
        margin: 10px;
        /* padding: 10px; */
        gap: 20px;
    }
    .pgTitle{
        font-size: 30px;
        font-weight: 300;
        margin: 10px;
        padding-top: 10px;
    }
</style>

<body>
    <div class="container">

                    alt="">
                     <span class="video-duration">12:34</span>
